name: Build Android App (APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Download and configure a specific version of Gradle to build without wrapper files
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      # Compile both Debug (ready-to-run on devices) and Release (unsigned) builds
      - name: Build with Gradle
        run: gradle assembleDebug assembleRelease
        working-directory: ${{ github.workspace }}

      # Upload the compiled APK files as artifacts that the user can download
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PakCNIC-Decodex-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: PakCNIC-Decodex-Release-APK-Unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
