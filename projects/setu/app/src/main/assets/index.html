<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Setu - Excise Trust Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

  <div class="app-container">
    
    <!-- Header -->
    <header>
      <div class="header-logo">
        <span class="logo-icon">🛡️</span>
        <h1>Setu Verify</h1>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <svg id="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Visual Container: Smart Card & Plate Rotator -->
    <section class="card-visual-wrapper">
      <div class="card-perspective-container">
        
        <div class="digital-card-rotator" id="digital-card">
          
          <!-- Front Face: Excise Smart Card Mockup -->
          <div class="card-face card-front">
            <div class="smart-card-top">
              <div class="card-emblem">🇵🇰</div>
              <div class="card-header-txt">GOVERNMENT OF PAKISTAN<br><span>VEHICLE REGISTRATION CARD</span></div>
            </div>
            
            <div class="smart-card-chip">
              <div class="chip-contacts"></div>
            </div>

            <div class="smart-card-details">
              <div class="detail-row">
                <span class="lbl">REG NO.</span>
                <span class="val" id="mock-reg-no">AWAITING INPUT</span>
              </div>
              <div class="detail-row">
                <span class="lbl">OWNER</span>
                <span class="val" id="mock-owner">RESOLVING DETAIL</span>
              </div>
              <div class="detail-grid">
                <div class="detail-row">
                  <span class="lbl">MAKER / MODEL</span>
                  <span class="val" id="mock-model">HONDA / TOYOTA</span>
                </div>
                <div class="detail-row">
                  <span class="lbl">COLOR</span>
                  <span class="val" id="mock-color">BLACK / WHITE</span>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Back Face: Localized License Plate Generator -->
          <div class="card-face card-back" id="plate-face">
            <div class="plate-inner-container">
              <div class="plate-emblem" id="plate-province-logo">🏛️</div>
              <div class="plate-number" id="plate-number-display">ABC-123</div>
              <div class="plate-province-name" id="plate-province-name">PUNJAB</div>
            </div>
          </div>

        </div>

        <!-- Translucent Card Flip Action Button -->
        <button class="flip-btn" id="flip-card-btn" aria-label="Flip card to reveal license plate">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
        </button>

      </div>
    </section>

    <!-- Workspace Controls -->
    <main class="control-panel">
      
      <!-- Input Panel HUD -->
      <div class="glass-card input-card">
        <label for="plate-input" class="panel-title-label">Enter Registration Number</label>
        <div class="search-container">
          <input 
            type="text" 
            id="plate-input" 
            placeholder="e.g. LHR-1234, AAA-123" 
            autocomplete="off"
            aria-label="License plate input"
          >
          <div id="validation-status" class="validation-badge status-incomplete">
            <span>Ready for plate...</span>
          </div>
        </div>
      </div>

      <!-- Action Verification Chips -->
      <div class="chip-container" id="action-chips" style="display: none;">
        <a id="btn-excise" class="action-chip verify-chip" href="#" target="_blank">
          🛡️ Query Excise Portal
        </a>
        <a id="btn-cplc" class="action-chip cplc-chip" href="#" target="_blank">
          🚓 CPLC Stolen Check
        </a>
      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
