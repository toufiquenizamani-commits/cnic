<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mandi Matrix - Agricultural Commodities</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Header -->
    <header>
      <div class="header-logo">
        <span class="logo-icon">🌾</span>
        <h1>Mandi Matrix</h1>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <svg id="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Filters Section -->
    <section class="filters-card glass-card">
      <div class="filter-row">
        <label for="city-select">Select Region</label>
        <select id="city-select" aria-label="Region selector">
          <option value="Lahore">Lahore (Punjab)</option>
          <option value="Karachi">Karachi (Sindh)</option>
          <option value="Islamabad">Islamabad (Capital)</option>
        </select>
      </div>
    </section>

    <!-- Chalkboard Commodity Board -->
    <section class="board-section">
      <h2 class="board-title">Daily Commodity Board</h2>
      <div class="chalkboard-grid" id="rates-grid">
        <!-- Rendered dynamically by app.js -->
      </div>
    </section>

    <!-- Budget Planner Section -->
    <section class="planner-section glass-card">
      <h3>Budget Cost Calculator</h3>
      <p class="section-subtitle">Add items to estimate local shopping lists vs. Mandi wholesale costs.</p>

      <div class="planner-inputs">
        <div class="select-field">
          <label for="crop-add-select">Item</label>
          <select id="crop-add-select" aria-label="Crop selector">
            <!-- Populated dynamically -->
          </select>
        </div>
        <div class="input-field">
          <label for="crop-qty-input">Qty (kg/l)</label>
          <input type="number" id="crop-qty-input" value="1" min="1" max="100">
        </div>
        <button class="btn btn-add" id="btn-add-item">Add</button>
      </div>

      <!-- Itemized list results -->
      <div class="budget-items-list" id="budget-list">
        <!-- Added rows render here -->
      </div>

      <div class="budget-totals" id="budget-totals" style="display: none;">
        <div class="total-col">
          <span class="title">Wholesale Cost</span>
          <span class="cost-val" id="total-wholesale-cost">Rs. 0</span>
        </div>
        <div class="total-col">
          <span class="title">Retail Mohalla Cost</span>
          <span class="cost-val text-alert" id="total-retail-cost">Rs. 0</span>
        </div>
      </div>
    </section>

  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
