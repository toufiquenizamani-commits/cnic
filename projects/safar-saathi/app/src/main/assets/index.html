<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Safar Saathi Pro - Road Trip Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Header -->
    <header>
      <div class="header-logo">
        <span class="logo-icon">🧭</span>
        <h1>Safar Saathi Pro</h1>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
        <svg id="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Main Content Area -->
    <main class="trip-workspace">
      
      <!-- Panel 1: Setup Wizard -->
      <section class="wizard-panel glass-card" id="setup-wizard-panel">
        <h2 class="section-title">Plan Your Journey</h2>
        
        <div class="control-grid">
          <div class="input-field">
            <label for="origin-input">From (Origin)</label>
            <input type="text" id="origin-input" list="cities-list" placeholder="e.g. Lahore">
          </div>
          <div class="input-field">
            <label for="destination-input">To (Destination)</label>
            <input type="text" id="destination-input" list="cities-list" placeholder="e.g. Islamabad">
          </div>
        </div>

        <datalist id="cities-list">
          <option value="Lahore"></option>
          <option value="Islamabad"></option>
          <option value="Karachi"></option>
          <option value="Peshawar"></option>
          <option value="Quetta"></option>
          <option value="Multan"></option>
          <option value="Faisalabad"></option>
          <option value="Gwadar"></option>
          <option value="Naran"></option>
          <option value="Kaghan"></option>
          <option value="Hunza"></option>
          <option value="Gilgit"></option>
          <option value="Swat"></option>
          <option value="Murree"></option>
          <option value="Abbottabad"></option>
          <option value="Skardu"></option>
          <option value="Muzaffarabad"></option>
          <option value="Chitral"></option>
          <option value="Nathia Gali"></option>
          <option value="Sialkot"></option>
        </datalist>

        <div class="input-field">
          <label for="car-select">Your Vehicle</label>
          <select id="car-select">
            <!-- Populated from db.js -->
          </select>
        </div>

        <div class="control-grid">
          <div class="input-field">
            <label for="passengers-input">Passengers Count</label>
            <input type="number" id="passengers-input" value="3" min="1" max="8">
          </div>
          <div class="input-field">
            <label for="luggage-input">Luggage Bags</label>
            <input type="number" id="luggage-input" value="2" min="0" max="6">
          </div>
        </div>

        <button class="btn btn-primary" id="btn-generate-trip">
          Create Trip Storyboard
        </button>
      </section>

      <!-- Panel 2: Storyboard Itinerary -->
      <section class="storyboard-panel glass-card" id="storyboard-panel" style="display: none;">
        <h2 class="section-title">Trip Storyboard</h2>
        
        <!-- Summary Strip -->
        <div class="trip-summary-strip">
          <div class="metric">
            <span id="summary-distance">0 km</span>
            <p>Distance</p>
          </div>
          <div class="metric">
            <span id="summary-eta">0 hrs</span>
            <p>ETA</p>
          </div>
          <div class="metric">
            <span id="summary-fuel-cost">Rs. 0</span>
            <p>Est. Fuel Cost</p>
          </div>
        </div>

        <!-- Scrollable Story Timeline -->
        <div class="timeline-container" id="timeline-list">
          <!-- Populated by app.js -->
        </div>

        <!-- Actions -->
        <div class="storyboard-actions">
          <button class="btn btn-secondary" id="btn-back-setup">Back to Plan</button>
          <button class="btn btn-secondary" id="btn-export-pdf">📄 Print PDF</button>
          <button class="btn btn-drive" id="btn-start-drive">Enter Drive Mode</button>
        </div>
      </section>

      <!-- Panel 3: Drive Mode HUD overlay -->
      <section class="drive-panel" id="drive-mode-panel" style="display: none;">
        <div class="hud-header">
          <span class="pulse-icon">🔴</span>
          <h3>DRIVE MODE ACTIVE</h3>
        </div>

        <div class="hud-compass-card">
          <div class="compass-ring">
            <div class="compass-direction" id="hud-compass-text">N</div>
          </div>
          <div class="hud-speed-gauge">
            <span class="speed">110</span>
            <span class="unit">km/h</span>
            <p>Speed Limit: 120</p>
          </div>
        </div>

        <div class="hud-stop-alert">
          <span class="alert-icon">⛽</span>
          <div class="alert-content">
            <h4 id="hud-next-stop-title">Bhera Service Area</h4>
            <p id="hud-next-stop-desc">Upcoming rest area in 12 km</p>
          </div>
        </div>

        <div class="hud-emergency-actions">
          <a class="btn btn-emergency" href="tel:130">
            📞 Call Motorway Police (130)
          </a>
          <button class="btn btn-hud-exit" id="btn-exit-drive">Exit Drive Mode</button>
        </div>
      </section>

    </main>

  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
